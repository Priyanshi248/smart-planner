<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

<h3>Edit Task</h3>

<form method="POST" action="/update/{{ task[0] }}">

    <input type="text" name="title" value="{{ task[1] }}" class="form-control mb-3">

    <select name="priority" class="form-control mb-3">
        <option value="high" {% if task[2]=='high' %}selected{% endif %}>High</option>
        <option value="medium" {% if task[2]=='medium' %}selected{% endif %}>Medium</option>
        <option value="low" {% if task[2]=='low' %}selected{% endif %}>Low</option>
    </select>

    <input type="date" name="task_date" value="{{ task[5] }}" class="form-control mb-3">
    <input type="time" name="user_time" value="{{ task[6] }}" class="form-control mb-3">

    <button class="btn btn-success">Update</button>

</form>

</body>
</html>
