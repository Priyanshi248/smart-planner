<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body style="font-family: Arial; background: #f4f4f4;">

    <div style="
        width: 300px;
        margin: 100px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
    ">
        <h2>Login</h2>

        <form method="POST">
            <input name="username" placeholder="Username" required
                style="width: 90%; padding: 8px; margin: 10px;"><br>

            <input name="password" type="password" placeholder="Password" required
                style="width: 90%; padding: 8px; margin: 10px;"><br>

            <button style="
                padding: 10px 20px;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            ">Login</button>
        </form>

        <p>Don't have an account? <a href="/signup">Signup</a></p>
    </div>

</body>
</html>
